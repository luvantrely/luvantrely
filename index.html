<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvantrely | Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; overflow: hidden; }
        /* Menu Width Control (Not Full Screen) */
        .side-drawer { 
            position: fixed; top: 0; right: 0; height: 100%; 
            width: 300px; /* Sirf itna bada khulega */
            background: #0a0a0a; border-left: 1px solid #1a1a1a;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
        }
        .menu-open { transform: translateX(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 90; }
        .show-overlay { display: block; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()" class="overlay"></div>

    <nav class="flex justify-between items-center px-8 py-8 absolute top-0 w-full z-50">
        <div class="text-pink-600 font-bold text-xl tracking-tighter">L.</div>
        <div onclick="toggleMenu()" class="cursor-pointer group">
            <svg class="w-7 h-7 text-white group-hover:text-pink-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
        </div>
    </nav>

    <div id="side-menu" class="side-drawer flex flex-col p-10 justify-between">
        <div class="space-y-12">
            <h3 class="text-[10px] tracking-[0.4em] text-gray-600 uppercase font-bold">Preferences</h3>
            
            <ul class="space-y-8">
                <li class="flex items-center space-x-4 cursor-pointer hover:text-pink-500 transition">
                    <span class="text-sm tracking-wide">My Profile</span>
                </li>
                <li class="flex items-center space-x-4 cursor-pointer hover:text-pink-500 transition">
                    <span class="text-sm tracking-wide">Discovery Settings</span>
                </li>
                <li class="flex items-center space-x-4 cursor-pointer hover:text-pink-500 transition">
                    <span class="text-sm tracking-wide">Luvantrely Luxe</span>
                </li>
                <li class="flex items-center space-x-4 cursor-pointer hover:text-pink-500 transition text-gray-400">
                    <span class="text-sm tracking-wide">App Settings</span>
                </li>
            </ul>
        </div>

        <div class="space-y-8">
            <div onclick="alert('Logged Out')" class="text-red-600 text-sm font-semibold cursor-pointer hover:opacity-70 transition border-t border-white/5 pt-6">
                Logout
            </div>
            <div class="text-[9px] text-gray-700 tracking-widest uppercase">
                Since 2026 | Luvantrely-Ved Prakash
            </div>
        </div>
    </div>

    <main id="main-content" class="h-screen flex flex-col items-center justify-center text-center px-6">
        <h2 class="text-5xl font-light tracking-tighter italic opacity-80 mb-2">Luvantrely</h2>
        <p class="text-[10px] tracking-[0.6em] text-pink-600 uppercase font-bold mb-12">Pure Intimacy</p>
        
        <button class="px-12 py-4 rounded-full border border-white/10 text-white text-[9px] tracking-[0.4em] uppercase hover:bg-white hover:text-black transition-all">
            Enter The Circle
        </button>
    </main>

    <script>
        let isOpen = false;
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('overlay');
            isOpen = !isOpen;
            if(isOpen) {
                menu.classList.add('menu-open');
                overlay.classList.add('show-overlay');
            } else {
                menu.classList.remove('menu-open');
                overlay.classList.remove('show-overlay');
            }
        }
    </script>
</body>
</html>
