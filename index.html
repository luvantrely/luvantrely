<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvantrely | Elite Connections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        .brand-font { font-family: 'Playfair Display', serif; }
        .glass-menu { 
            background: rgba(15, 15, 15, 0.95); 
            backdrop-filter: blur(25px); 
            border-left: 1px solid rgba(255, 255, 255, 0.1); 
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .premium-gradient { background: linear-gradient(45deg, #f43f5e, #fb923c); }
    </style>
</head>
<body class="text-white overflow-hidden">

    <nav class="flex justify-between items-center px-8 py-6 absolute top-0 w-full z-40">
        <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center cursor-pointer hover:bg-white/5 transition">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" class="w-6 h-6 text-gray-400">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
        </div>
        
        <h1 class="brand-font text-2xl tracking-[0.3em] font-bold italic text-white">LUVANTRELY</h1>

        <div onclick="toggleMenu()" class="cursor-pointer p-2 z-50">
            <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                <path id="path1" stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        </div>
    </nav>

    <div id="side-menu" class="fixed top-0 right-0 h-full w-80 glass-menu translate-x-full z-[45] flex flex-col p-10 justify-between">
        <div class="space-y-10">
            <h3 class="text-[10px] tracking-[0.4em] text-gray-500 uppercase font-bold">Menu</h3>
            <ul class="space-y-6 text-[13px] tracking-widest font-light uppercase">
                <li class="cursor-pointer hover:text-rose-500 transition border-b border-white/5 pb-3 flex justify-between items-center">
                    My Profile <span class="text-[10px] text-gray-600">Edit</span>
                </li>
                <li class="cursor-pointer hover:text-rose-500 transition border-b border-white/5 pb-3">Discovery Settings</li>
                
                <li class="cursor-pointer premium-gradient p-3 rounded-lg text-black font-bold text-center shadow-lg shadow-rose-500/20">
                    LUVANTRELY LUXE
                </li>
                
                <li class="cursor-pointer hover:text-rose-500 transition border-b border-white/5 pb-3">Safety & Security</li>
            </ul>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <p class="text-[10px] text-gray-500 hover:text-white cursor-pointer transition">Terms & Conditions</p>
                <p class="text-[10px] text-gray-500 hover:text-white cursor-pointer transition">Privacy Policy</p>
            </div>
            
            <div class="pt-6 border-t border-white/10">
                <p class="text-[9px] tracking-widest text-gray-600 uppercase">
                    Since 2026 | Luvantrely-Ved Prakash
                </p>
            </div>
            <p class="text-xs text-red-700 cursor-pointer hover:text-red-500 transition">SIGN OUT</p>
        </div>
    </div>

    <main class="h-screen flex flex-col items-center justify-center px-10 text-center">
        <div class="max-w-md animate-pulse-slow">
            <h2 class="text-5xl font-bold leading-tight mb-4 brand-font italic tracking-tighter">Elite Connections.</h2>
            <p class="text-gray-500 text-[10px] tracking-[0.5em] uppercase mb-12">Sophistication. Intimacy. Desire.</p>
            
            <button onclick="alert('Applications opening soon.')" class="w-full py-5 rounded-full border border-white/20 text-white font-bold text-[10px] tracking-[0.3em] uppercase hover:bg-white hover:text-black transition-all duration-500">
                ENTER THE CIRCLE
            </button>
        </div>
    </main>

    <script>
        let menuOpen = false;
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const icon = document.getElementById('menu-icon');
            if (!menuOpen) {
                menu.style.transform = 'translateX(0)';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />'; 
                menuOpen = true;
            } else {
                menu.style.transform = 'translateX(100%)';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />'; 
                menuOpen = false;
            }
        }
    </script>
</body>
</html>
